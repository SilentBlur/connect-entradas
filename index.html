<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect · Entradas</title>
<meta name="description" content="Plataforma de entradas de Connect — gestión de eventos, QR y control de acceso.">
<link rel="icon" type="image/png" href="assets/rombo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,500;1,600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Generación de QR -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<!-- Lector de QR por cámara -->
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<!-- Backend: cliente de Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css?v=15">
<!-- Capa visual de las pantallas del cliente (reclamar/canje/ticket) -->
<link rel="stylesheet" href="client.css?v=15">
</head>
<body>
  <div id="app" class="app-shell">
    <div class="boot">
      <div class="boot-rombo"></div>
      <div class="boot-text">CONNECT</div>
    </div>
  </div>

  <!-- Capa de modales / toasts -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="cloud.js?v=15"></script>
  <script src="app.js?v=15"></script>
  <!-- Mejoras visuales del cliente (validaciones, cuenta regresiva, etc.) -->
  <script src="client.js?v=15"></script>
</body>
</html>
